<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhatti Petroleum - Register Account</title>
    <link rel="icon" href="data:,">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #d6dbdf;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        .register-card {
            width: 400px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            border: 1px solid #b0bec5;
        }

        .register-header {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .register-header h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .register-header p {
            font-size: 11px;
            opacity: 0.9;
        }

        .register-body {
            padding: 25px 20px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #37474f;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #b0bec5;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #1a2a6c;
            box-shadow: 0 0 4px rgba(26, 42, 108, 0.3);
        }

        .btn-register {
            width: 100%;
            padding: 10px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s ease;
        }

        .btn-register:hover {
            background-color: #219653;
        }

        .alert-msg {
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }

        .alert-error {
            background-color: #fce4e4;
            color: #c0392b;
        }

        .alert-success {
            background-color: #e8f8f5;
            color: #27ae60;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
        }

        .login-link a {
            color: #1a2a6c;
            font-weight: bold;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="register-card">
        <div class="register-header">
            <h2>⛽ Bhatti Petroleum</h2>
            <p>Create Manager Account</p>
        </div>

        <div class="register-body">
            <div id="alertMsg" class="alert-msg"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. Aftab Ahmad" required>
                </div>

                <div class="form-group">
                    <label for="username">Username / System ID</label>
                    <input type="text" id="username" placeholder="e.g. aftab123" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                </div>

                <button type="submit" class="btn-register">Create Account</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Login Here</a>
            </div>
        </div>
    </div>

   <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const fullName = document.getElementById('fullName').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            showAlert("Passwords do not match!", "error");
            return;
        }

        try {
            // Full URL on Port 5000
            const response = await fetch('http://localhost:5000/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    fullName: fullName,
                    username: username,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok && data.status === "Success") {
                showAlert("Account created successfully! Redirecting to login...", "success");

                document.getElementById('registerForm').reset();

                setTimeout(() => {
                    window.location.href = '/login,html';
                }, 1500);
            } else {
                showAlert(data.message || "Registration failed!", "error");
            }
        } catch (err) {
            console.error("Register Error:", err);
            showAlert("Server Connection Failed!", "error");
        }
    });

    function showAlert(msg, type) {
        const alertMsg = document.getElementById('alertMsg');
        alertMsg.innerText = msg;
        alertMsg.className = `alert-msg ${type === 'error' ? 'alert-error' : 'alert-success'}`;
        alertMsg.style.display = 'block';
    }
</script>

</body>

</html>
